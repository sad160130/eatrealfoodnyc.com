<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Forest green circle background -->
  <circle cx="16" cy="16" r="16" fill="#1B3A2D"/>

  <!-- Fork with NYC skyline tines -->
  <!-- Left tine — tall (Empire State Building height) -->
  <rect x="9" y="6" width="2" height="12" rx="1" fill="#52B788"/>

  <!-- Middle tine — medium (Chrysler Building height) -->
  <rect x="15" y="8" width="2" height="10" rx="1" fill="#52B788"/>

  <!-- Right tine — tall (One World Trade height) -->
  <rect x="21" y="5" width="2" height="13" rx="1" fill="#52B788"/>

  <!-- Fork handle connecting all tines -->
  <rect x="9" y="18" width="14" height="2" rx="1" fill="#52B788"/>
  <rect x="14" y="20" width="4" height="7" rx="1.5" fill="#52B788"/>

  <!-- Small leaf on middle tine — healthy signal -->
  <ellipse cx="16" cy="9" rx="2.5" ry="1.5" fill="#D4A853" transform="rotate(-30 16 9)"/>
</svg>
